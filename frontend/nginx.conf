server {
    listen 3001; # change in production
    server_name localhost; # change in production
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ────────────────────────────────────────────────────────────────
    # Security Headers
    # ────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ────────────────────────────────────────────────────────────────
    # Gzip compression
    # ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ────────────────────────────────────────────────────────────────
    # Cache static assets (long-term cache)
    # ────────────────────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ────────────────────────────────────────────────────────────────
    # Cache index.html (short-term, no-cache to check for updates)
    # ────────────────────────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ────────────────────────────────────────────────────────────────
    # API Proxy — route /api/* to backend FastAPI server
    # ────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ────────────────────────────────────────────────────────────────
    # SPA Fallback — all unmatched routes serve index.html
    # ────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ────────────────────────────────────────────────────────────────
    # Error handling
    # ────────────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
